# React SPA (React Router) — Nginx config for aaPanel
# Fixes 404 when opening direct links or refreshing (e.g. airestro360.com/id, /id/tools).
# Fixes "Failed to load module script" / "application/octet-stream" for .mjs (PDF worker).
#
# In aaPanel: Website → airestro360.com → Config
# 1. Ensure "Site directory" / "Running directory" points to your React BUILD folder
#    (the folder that contains index.html and the assets folder — e.g. dist or build).
# 2. Add the blocks below inside the server { } block (e.g. after #REWRITE-END).

    # Serve .mjs as JavaScript (required for pdf.worker; use default_type so it overrides Nginx default)
    location ~* \.mjs$ {
        default_type application/javascript;
        try_files $uri =404;
    }

    # Tenant media from CMS "Media library" (files under React public/cms-uploads/...) — must NOT fall through to SPA
    location ^~ /cms-uploads/ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Same-origin uploads when nginx maps /uploads → Laravel storage (optional; harmless if unused)
    location ^~ /uploads/ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # React Router: serve index.html for all routes so the SPA can handle them
    location / {
        try_files $uri $uri/ /index.html;
    }
